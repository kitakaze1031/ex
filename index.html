<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ハッセ図ビューア（閲覧専用）</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
            background-color: #f4f7f6;
            overflow: hidden;
        }

        #toolbar {
            background-color: #2c3e50;
            padding: 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            z-index: 10;
            flex-shrink: 0;
            min-height: 40px;
            align-items: center;
        }

        #toolbar::-webkit-scrollbar {
            height: 4px;
        }

        #toolbar::-webkit-scrollbar-thumb {
            background: #7f8c8d;
            border-radius: 4px;
        }

        button {
            flex-shrink: 0;
            padding: 10px 14px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
        }

        button.active {
            background-color: #3498db;
            box-shadow: 0 0 8px #3498db;
        }

        button.active-delete {
            background-color: #e74c3c;
            box-shadow: 0 0 8px #e74c3c;
        }

        button.active-prereq {
            background-color: #e67e22;
            box-shadow: 0 0 8px #e67e22;
        }

        button.active-trans {
            background-color: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }

        .btn-io {
            background-color: #8e44ad;
        }

        .add-group {
            display: inline-flex;
            align-items: center;
            background-color: #34495e;
            border-radius: 8px;
            padding: 6px 8px;
            flex-shrink: 0;
            gap: 12px;
        }

        .add-group button {
            background-color: transparent;
            padding: 8px 4px;
        }

        .color-palette-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.15);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .color-palette {
            display: grid;
            grid-template-columns: repeat(10, 22px);
            gap: 4px;
        }

        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-sizing: border-box;
            transition: transform 0.1s;
        }

        .color-swatch:active {
            transform: scale(0.85);
        }

        .color-swatch.selected {
            border: 2px solid #fff;
            box-shadow: 0 0 0 2px #3498db;
        }

        input[type="color"] {
            width: 32px;
            height: 32px;
            padding: 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
            flex-shrink: 0;
        }

        input[type="text"],
        input[type="url"],
        textarea {
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #cfd8dc;
            border-radius: 8px;
            padding: 10px;
            font-size: 14px;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        #group-name-input {
            width: 120px;
            min-width: 120px;
            background: #ffffff;
            color: #2c3e50;
        }

        #cy-wrap {
            position: relative;
            flex: 1;
            min-height: 0;
        }

        #cy {
            width: 100%;
            height: 100%;
        }

        #group-legend {
            position: absolute;
            right: 12px;
            bottom: 12px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 10px 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
            min-width: 170px;
            max-width: min(70vw, 260px);
            font-size: 13px;
            color: #2c3e50;
        }

        #group-legend h4 {
            margin: 0 0 8px 0;
            font-size: 13px;
        }

        #group-legend-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            line-height: 1.3;
        }

        .legend-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 1px solid rgba(0, 0, 0, 0.15);
            flex-shrink: 0;
        }

        .legend-empty {
            color: #7f8c8d;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
        }

        .floating-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 14px;
            width: 88%;
            max-width: 360px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 1000;
        }

        .floating-modal h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #333;
            text-align: center;
        }

        .modal-field {
            margin-bottom: 12px;
        }

        .modal-field label {
            display: block;
            font-size: 12px;
            color: #555;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .modal-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            text-decoration: none;
            text-align: center;
            box-sizing: border-box;
        }

        .modal-btn.disabled {
            background-color: #bdc3c7;
            pointer-events: none;
        }

        .modal-btn.secondary {
            background-color: #16a085;
        }

        .close-btn {
            background-color: #e74c3c;
            margin-top: 15px;
            margin-bottom: 0;
        }

        .hint-text {
            margin: 6px 0 0 0;
            font-size: 12px;
            color: #607d8b;
            line-height: 1.4;
        }
    </style>
</head>

<body>
    <div id="toolbar">
        <span style="color:#fff; font-size:14px; font-weight:bold; padding:0 8px;">👁 閲覧モード</span>
        <button id="arrange-btn">✨ 整列</button>
        <button id="load-btn" class="btn-io" onclick="document.getElementById('file-input').click()">📂 別データ読込</button>
        <input type="file" id="file-input" style="display: none;" accept=".json">
    </div>

    <div id="cy-wrap">
        <div id="cy"></div>
        <div id="group-legend">
            <h4>グループ表示（色で分類）</h4>
            <div id="group-legend-list"></div>
        </div>
    </div>

    <div id="modal-overlay"></div>

    <div id="link-modal" class="floating-modal">
        <h3>トランジション一覧</h3>
        <div id="modal-content"></div>
        <button class="modal-btn close-btn" onclick="closeModal()">閉じる</button>
    </div>

    <div id="node-editor" class="floating-modal">
        <h3>技を編集</h3>
        <div class="modal-field">
            <label for="node-name-input">技名</label>
            <textarea id="node-name-input" placeholder="技名を入力"></textarea>
            <p class="hint-text">改行もそのまま使えます。</p>
        </div>
        <div class="modal-field">
            <label for="node-url-input">動画URL</label>
            <input type="url" id="node-url-input" placeholder="https://...">
        </div>
        <div class="modal-field">
            <label>色</label>
            <div class="color-palette-container" style="background: transparent; padding: 0; justify-content: center; margin-bottom: 8px;">
                <div id="modal-color-palette" class="color-palette" style="grid-template-columns: repeat(5, 28px); gap: 10px;"></div>
            </div>
            <div style="text-align: center;">
                <input type="color" id="node-color-input" value="#3498db" title="その他の色を選択">
            </div>
        </div>
        <div class="modal-field">
            <label for="node-group-input">グループ名</label>
            <input type="text" id="node-group-input" placeholder="例: 返し技 / 左系 / 基本形">
        </div>
        <button id="node-save-btn" class="modal-btn">保存</button>
        <button class="modal-btn close-btn" onclick="closeNodeEditor()">閉じる</button>
    </div>

    <div id="trans-editor" class="floating-modal">
        <h3>遷移線を編集</h3>
        <div class="modal-field">
            <label for="trans-name-input">遷移名（先頭の1件）</label>
            <input type="text" id="trans-name-input" placeholder="遷移名">
        </div>
        <div class="modal-field">
            <label for="trans-url-input">動画URL</label>
            <input type="url" id="trans-url-input" placeholder="https://...">
        </div>
        <p class="hint-text">この画面では先頭の遷移名を編集できます。</p>
        <button id="trans-save-btn" class="modal-btn">保存</button>
        <button class="modal-btn close-btn" onclick="closeTransEditor()">閉じる</button>
    </div>

    <script>
        function normalizeColor(c){if(!c)return"#3498db";c=String(c).trim().toLowerCase();if(/^#[0-9a-f]{3}$/.test(c))c="#"+c[1]+c[1]+c[2]+c[2]+c[3]+c[3];return c;}
        const cy=cytoscape({container:document.getElementById("cy"),style:[
            {selector:"node",style:{"label":"data(label)","background-color":"#95a5a6","color":"#333","text-valign":"bottom","text-margin-y":5,"font-size":"14px","width":40,"height":40,"text-wrap":"wrap","z-index":30,"z-index-compare":"manual"}},
            {selector:"edge[edgeType=\"prereq\"]",style:{"width":3,"line-color":"#95a5a6","target-arrow-color":"#95a5a6","target-arrow-shape":"triangle","curve-style":"straight","z-index":1,"z-index-compare":"manual"}},
            {selector:"edge[edgeType=\"trans\"]",style:{"width":4,"line-color":"#2ecc71","target-arrow-color":"#2ecc71","target-arrow-shape":"vee","line-style":"dashed","curve-style":"unbundled-bezier","control-point-distances":[60],"control-point-weights":[0.5],"label":"data(label)","text-wrap":"wrap","font-size":"12px","color":"#27ae60","text-background-opacity":1,"text-background-color":"#ffffff","text-background-padding":"4px","text-background-shape":"roundrectangle","text-border-opacity":1,"text-border-color":"#2ecc71","text-border-width":1,"text-events":"yes","z-index":10,"z-index-compare":"manual"}},
            {selector:".selected-source",style:{"border-width":5,"border-color":"#e74c3c"}},
            {selector:"node[url]",style:{"text-border-color":"#e74c3c","text-border-width":2}},
            {selector:"edge[hasTransUrl]",style:{"text-border-color":"#e74c3c","text-border-width":2}}
        ]});
        const modalOverlay=document.getElementById("modal-overlay");
        const linkModal=document.getElementById("link-modal");
        const modalContent=document.getElementById("modal-content");
        const nodeEditor=document.getElementById("node-editor");
        const transEditor=document.getElementById("trans-editor");
        function openOverlay(){modalOverlay.style.display="block";}
        function closeOverlayIfUnused(){if(![linkModal,nodeEditor,transEditor].some(el=>el.style.display==="block"))modalOverlay.style.display="none";}
        function closeModal(){linkModal.style.display="none";closeOverlayIfUnused();}
        function closeNodeEditor(){nodeEditor.style.display="none";closeOverlayIfUnused();}
        function closeTransEditor(){transEditor.style.display="none";closeOverlayIfUnused();}
        function buildTransitionLabel(t){if(!t||!t.length)return"";if(t.length===1)return t[0].name||"";return t.map((x,i)=>(i+1)+". "+(x.name||"")).join("\n");}
        function updateNodeDisplay(node){const r=node.data("rawName")||"無名";const u=(node.data("url")||"").trim();node.data("label",r+(u?"\n\uD83D\uDD17":""));}
        function normalizeGraphData(){
            cy.nodes().forEach(node=>{const color=normalizeColor(node.data("color")||"#3498db");node.data("color",color);node.style("background-color",color);if(node.data("groupName")==null)node.data("groupName","");if(!node.data("rawName"))node.data("rawName",(node.data("label")||"").replace(/\n?\uD83D\uDD17/g,""));updateNodeDisplay(node);});
            cy.edges("[edgeType=\"trans\"]").forEach(edge=>{const t=edge.data("transitions")||(edge.data("label")?[{name:edge.data("label"),url:""}]:[]);edge.data({transitions:t,label:buildTransitionLabel(t),hasTransUrl:t.some(x=>x.url)});});
        }
        function updateGroupLegend(){const list=document.getElementById("group-legend-list");const g=new Map();cy.nodes().forEach(node=>{const c=normalizeColor(node.data("color")||"#3498db");const gn=(node.data("groupName")||"").trim();if(!g.has(c))g.set(c,{color:c,names:new Set(),count:0});const e=g.get(c);e.count++;if(gn)e.names.add(gn);});if(!g.size){list.innerHTML="<div class=\"legend-empty\">データを読み込むとここに表示されます。</div>";return;}list.innerHTML="";Array.from(g.values()).sort((a,b)=>b.count-a.count).forEach(gr=>{const item=document.createElement("div");item.className="legend-item";const dn=gr.names.size>0?Array.from(gr.names).join(" / "):"(名前なし)";item.innerHTML="<span class=\"legend-swatch\" style=\"background:"+gr.color+"\"></span><span>"+dn+" ("+gr.count+")</span>";list.appendChild(item);});}
        function showModal(transitions){modalContent.innerHTML="";transitions.forEach(t=>{const btn=document.createElement("a");btn.className="modal-btn"+(t.url?"":" disabled");btn.textContent=t.name+(t.url?" 🎥":" (動画なし)");if(t.url){btn.href=t.url;btn.target="_blank";}modalContent.appendChild(btn);});openOverlay();linkModal.style.display="block";}
        modalOverlay.addEventListener("click",()=>{closeModal();closeNodeEditor();closeTransEditor();});
        let tapTimeout=null,lastTapTarget=null;
        cy.on("tap",function(evt){const target=evt.target;if(lastTapTarget===target&&tapTimeout!==null){clearTimeout(tapTimeout);tapTimeout=null;lastTapTarget=null;return;}lastTapTarget=target;tapTimeout=setTimeout(()=>{tapTimeout=null;lastTapTarget=null;if(target===cy)return;if(target.isNode()){const url=(target.data("url")||"").trim();if(url)window.open(url,"_blank");else alert("この技にはURLが設定されていません。");}else if(target.isEdge()&&target.data("edgeType")==="trans"){const transitions=target.data("transitions")||[];if(!transitions.length)return;if(transitions.length===1&&transitions[0].url)window.open(transitions[0].url,"_blank");else showModal(transitions);}},250);});
        document.getElementById("arrange-btn").addEventListener("click",()=>{cy.layout({name:"breadthfirst",directed:true,padding:50,spacingFactor:1.5}).run();});
        document.getElementById("file-input").addEventListener("change",(evt)=>{const file=evt.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(e)=>{try{cy.json(JSON.parse(e.target.result));normalizeGraphData();updateGroupLegend();cy.nodes().ungrabify();}catch(err){alert("読み込みに失敗しました。");}};reader.readAsText(file);evt.target.value="";});
